<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Historia — FonoMundos 🌿</title>
<meta property="og:title" content="🌿 MODO HISTORIA — FonoMundos">
<meta property="og:description" content="Nuevo en FonoMundos: explora el Bosque de los Sonidos en 3D. 7 zonas clínicas gamificadas.">
<meta property="og:url" content="https://fonomundos.vercel.app/modo-historia.html">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;}
  iframe{
    position:fixed;inset:0;width:100%;height:100%;
    border:none;display:block;
  }
  .globo{
    position:fixed;top:16px;right:16px;z-index:9999;
    animation:wobble 2.8s ease-in-out infinite;
    filter:drop-shadow(0 6px 18px rgba(34,197,94,0.55));
    cursor:default;
  }
  .globo-circulo{
    width:160px;height:160px;border-radius:50%;
    background:linear-gradient(145deg,#22c55e 0%,#16a34a 55%,#14532d 100%);
    border:4px solid #fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:16px;
    box-shadow:inset 0 -6px 14px rgba(0,0,0,0.25),inset 0 4px 8px rgba(255,255,255,0.2);
  }
  .globo-emoji{font-size:30px;line-height:1;margin-bottom:4px;}
  .globo-titulo{
    font-family:'Arial Black',Impact,sans-serif;
    font-size:17px;font-weight:900;color:#fff;
    line-height:1.1;letter-spacing:.5px;text-transform:uppercase;
    text-shadow:0 2px 4px rgba(0,0,0,0.4);
  }
  .globo-nuevo{
    font-size:10px;color:rgba(255,255,255,0.8);
    letter-spacing:2px;text-transform:uppercase;margin-top:5px;
    font-family:Arial,sans-serif;font-weight:bold;
  }
  .hilo{
    width:2px;height:32px;
    background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);
    margin:0 auto;border-radius:2px;
  }
  @keyframes wobble{
    0%,100%{transform:rotate(-4deg) translateY(0);}
    30%{transform:rotate(4deg) translateY(-4px);}
    60%{transform:rotate(-2deg) translateY(-2px);}
  }
</style>
</head>
<body>

<!-- App original a pantalla completa -->
<iframe src="/" title="FonoMundos"></iframe>

<!-- Globo MODO HISTORIA -->
<div class="globo">
  <div class="globo-circulo">
    <div class="globo-emoji">🌿</div>
    <div class="globo-titulo">MODO<br>HISTORIA</div>
    <div class="globo-nuevo">✨ NUEVO</div>
  </div>
  <div class="hilo"></div>
</div>

</body>
</html>
