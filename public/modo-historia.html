<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Historia — FonoMundos 🌿</title>
<meta property="og:title" content="🌿 MODO HISTORIA — FonoMundos">
<meta property="og:description" content="Nuevo en FonoMundos: explora el Bosque de los Sonidos en 3D. 7 zonas clínicas gamificadas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;}

  iframe{
    position:fixed;inset:0;width:100%;height:100%;
    border:none;display:block;
  }

  /* ===== GLOBO CENTRAL ===== */
  .globo{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-54%) rotate(-4deg);
    z-index:9999;
    animation:flotar 3.2s ease-in-out infinite;
    cursor:pointer;
    text-decoration:none;
  }
  .globo:hover .circulo{
    transform:scale(1.05);
    box-shadow:0 0 0 5px #fff,0 0 0 9px #8B5E3C,8px 16px 40px rgba(0,0,0,0.45);
  }
  .circulo{
    width:250px;height:250px;border-radius:50%;
    background:radial-gradient(circle at 38% 35%,#fffcf2 0%,#fdf3e0 40%,#f5e0b8 100%);
    border:5px solid #8B5E3C;
    box-shadow:
      0 0 0 3px #fdf3e0,
      0 0 0 7px #8B5E3C,
      6px 14px 36px rgba(0,0,0,0.35);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px;
    transition:transform .2s,box-shadow .2s;
    position:relative;
    overflow:hidden;
  }
  /* Textura papel sutil */
  .circulo::before{
    content:'';position:absolute;inset:0;border-radius:50%;
    background:repeating-linear-gradient(
      0deg,transparent,transparent 18px,rgba(139,94,60,0.04) 18px,rgba(139,94,60,0.04) 19px
    );
    pointer-events:none;
  }
  .globo-nuevo{
    font-family:'Patrick Hand',cursive;
    font-size:13px;color:#b45309;
    letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;
  }
  .globo-emoji{font-size:36px;line-height:1;margin-bottom:6px;}
  .globo-titulo{
    font-family:'Patrick Hand',cursive;
    font-size:28px;font-weight:bold;color:#14532d;
    line-height:1.1;
    text-shadow:1px 1px 0 rgba(139,94,60,0.2);
  }
  .globo-sub{
    font-family:'Patrick Hand',cursive;
    font-size:14px;color:#78350f;margin-top:8px;line-height:1.3;
  }
  .globo-btn{
    margin-top:12px;
    background:#22c55e;color:#fff;
    font-family:'Patrick Hand',cursive;font-size:15px;font-weight:bold;
    padding:7px 22px;border-radius:20px;
    box-shadow:0 3px 0 #14532d;
    display:inline-block;
  }

  /* Hilo */
  .hilo{
    width:3px;height:40px;
    background:linear-gradient(to bottom,#8B5E3C 0%,rgba(139,94,60,0.2) 100%);
    margin:0 auto;border-radius:2px;
  }

  @keyframes flotar{
    0%,100%{transform:translate(-50%,-54%) rotate(-4deg);}
    40%{transform:translate(-50%,-58%) rotate(3deg);}
    70%{transform:translate(-50%,-52%) rotate(-2deg);}
  }
</style>
</head>
<body>

<!-- App original a pantalla completa -->
<iframe id="app" src="/" title="FonoMundos"></iframe>

<!-- Globo central crayón -->
<a class="globo" href="#" onclick="irHistoria(event)">
  <div class="circulo">
    <div class="globo-nuevo">✏️ Novedad</div>
    <div class="globo-emoji">🌿</div>
    <div class="globo-titulo">MODO<br>HISTORIA</div>
    <div class="globo-sub">Bosque de los Sonidos<br>en 3D</div>
    <div class="globo-btn">🎮 ¡Entrar!</div>
  </div>
  <div class="hilo"></div>
</a>

<script>
function irHistoria(e){
  e.preventDefault();
  // Navega la app al Modo Historia vía hash
  const iframe=document.getElementById('app');
  if(iframe && iframe.contentWindow){
    iframe.contentWindow.location.hash='historia';
  } else {
    window.location.href='/#historia';
  }
}
</script>
</body>
</html>
